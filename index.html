<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Edits</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  color: white;
  transition: background 2s;
}

/* Background animation */
.container {
  margin-top: 50px;
}

input, textarea, button {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* Celebration page */
#celebration {
  display: none;
}

/* Big Image */
#outputImage {
  width: 300px;
  border-radius: 15px;
  margin-top: 20px;
}

/* Sparkle animation */
.sparkle {
  position: fixed;
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  from { transform: translateY(-100px); opacity: 1; }
  to { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>🎂 Birthday Edits Website 🎉</h1>

<div class="container" id="main">

  <input type="file" id="photoInput"><br>

  <input type="date" id="dateInput"><br>

  <textarea id="message" placeholder="Write birthday message..."></textarea><br>

  <button onclick="startSurprise()">Press for Surprise 🎁</button>

</div>

<!-- Celebration Page -->
<div id="celebration">
  <h1>🎉 Happy Birthday 🎂</h1>
  <h2 id="countdown"></h2>
  <img id="outputImage">
  <p id="outputMessage"></p>
</div>

<!-- Audio -->
<audio id="song" src="birthday.mp3"></audio>

<script>

// 🌈 Background color animation
const colors = ["#ff4d4d", "#ffcc00", "#33cc33", "#3399ff", "#cc33ff"];
let i = 0;

setInterval(() => {
  document.body.style.background = colors[i];
  i = (i + 1) % colors.length;
}, 2000);

// 🎁 Surprise function
function startSurprise() {

  // Hide main, show celebration
  document.getElementById("main").style.display = "none";
  document.getElementById("celebration").style.display = "block";

  // Message
  let msg = document.getElementById("message").value;
  document.getElementById("outputMessage").innerText = msg;

  // Image
  let file = document.getElementById("photoInput").files[0];
  let reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById("outputImage").src = e.target.result;
  }
  if(file) reader.readAsDataURL(file);

  // 🎵 FIXED SONG PLAY (important)
  let song = document.getElementById("song");
  song.play().catch(() => {
    alert("Click again to play music 🎵");
  });

  // Countdown
  let date = new Date(document.getElementById("dateInput").value);

  setInterval(() => {
    let now = new Date();
    let diff = date - now;

    if(diff <= 0) {
      document.getElementById("countdown").innerText = "🎉 Today is the Day! 🎉";
      return;
    }

    let days = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("countdown").innerText = days + " days left 🎂";
  }, 1000);

  // ✨ Sparkle effect
  for(let i=0; i<50; i++){
    let s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * 100 + "vw";
    s.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(s);
  }
}

</script>

</body>
</html>
