<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Edits</title>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    color: white;
    margin: 0;
    transition: background 2.5s ease-in-out;
    background: #1e90ff; 
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  .container {
    padding: 20px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  input, textarea {
    margin: 10px;
    padding: 12px;
    border-radius: 8px;
    border: none;
    width: 250px;
    outline: none;
  }

  .cool-btn {
    margin-top: 20px;
    padding: 15px 35px;
    font-size: 1.1rem;
    font-weight: bold;
    color: white;
    background: linear-gradient(45deg, #ff4757, #ff6b81);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
    transition: all 0.3s ease;
  }

  .cool-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6);
  }

  /* Style for the Back Button */
  .back-btn {
    background: rgba(0, 0, 0, 0.3);
    margin-bottom: 20px;
    font-size: 0.9rem;
  }

  #timerDisplay {
    font-size: 1.5rem;
    font-weight: bold;
    margin: 15px 0;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }

  #celebration {
    display: none;
    width: 90%;
    max-width: 600px;
  }

  #outputImage {
    width: 100%; 
    max-height: 60vh;
    object-fit: contain;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    margin-bottom: 20px;
  }

  #outputMessage {
    font-size: 1.4rem;
    line-height: 1.6;
    padding: 15px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 15px;
  }

  .sparkle {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: fall 3s linear infinite;
    z-index: 999;
  }

  @keyframes fall {
    0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>

<body>

<div class="container" id="main">
  <h1>🎂 Birthday Edits 🎉</h1>
  <input type="file" id="photoInput" accept="image/*"><br>
  <input type="date" id="dateInput"><br>
  
  <div id="timerDisplay">Select a date to start timer</div>

  <textarea id="message" placeholder="Write birthday message..."></textarea><br>
  <button class="cool-btn" onclick="startSurprise()">Press for Surprise 🎁</button>
</div>

<div id="celebration">
  <button class="cool-btn back-btn" onclick="goBack()">⬅️ Edit Again (Stop Music)</button>
  
  <h1>🎊 Happy Birthday! 🎊</h1>
  <img id="outputImage">
  <p id="outputMessage"></p>
</div>

<audio id="song" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>
const colors = ["#ff4d4d", "#33cc33", "#3399ff", "#cc33ff", "#ff9f43"];
let colorIdx = 0;
setInterval(() => {
  document.body.style.background = colors[colorIdx];
  colorIdx = (colorIdx + 1) % colors.length;
}, 3000);

const dateInput = document.getElementById('dateInput');
const timerDisplay = document.getElementById('timerDisplay');

setInterval(() => {
  if(!dateInput.value) return;
  const targetDate = new Date(dateInput.value).getTime();
  const now = new Date().getTime();
  const diff = targetDate - now;

  if(diff <= 0) {
    timerDisplay.innerText = "🎉 It's Birthday Time! 🎉";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const secs = Math.floor((diff % (1000 * 60)) / 1000);
  timerDisplay.innerText = `${days}d ${hours}h ${mins}m ${secs}s left 🎂`;
}, 1000);

function startSurprise() {
  const mainPage = document.getElementById("main");
  const celebPage = document.getElementById("celebration");
  const song = document.getElementById("song");

  song.play().catch(e => console.log("Audio play blocked"));

  mainPage.style.display = "none";
  celebPage.style.display = "block";

  document.getElementById("outputMessage").innerText = document.getElementById("message").value;
  
  let file = document.getElementById("photoInput").files[0];
  if(file) {
    let reader = new FileReader();
    reader.onload = (e) => document.getElementById("outputImage").src = e.target.result;
    reader.readAsDataURL(file);
  }
  createSparkles();
}

// THE NEW GO BACK FUNCTION
function goBack() {
  const mainPage = document.getElementById("main");
  const celebPage = document.getElementById("celebration");
  const song = document.getElementById("song");

  // STOP THE SONG
  song.pause();
  song.currentTime = 0; // Resets song to the start

  // SWITCH PAGES
  celebPage.style.display = "none";
  mainPage.style.display = "block";

  // REMOVE SPARKLES (Cleans up the screen)
  const sparkles = document.querySelectorAll('.sparkle');
  sparkles.forEach(s => s.remove());
}

// ALSO STOP MUSIC IF USER USES BROWSER BACK BUTTON
window.onbeforeunload = function() {
  document.getElementById("song").pause();
};

function createSparkles() {
  const partyColors = ['#FFD700', '#FF69B4', '#00FFFF', '#ADFF2F', '#FFFFFF'];
  for(let i=0; i < 60; i++) {
    let sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    sparkle.style.left = Math.random() * 100 + "vw";
    sparkle.style.backgroundColor = partyColors[Math.floor(Math.random() * partyColors.length)];
    sparkle.style.animationDuration = (Math.random() * 2 + 2) + "s";
    sparkle.style.animationDelay = Math.random() * 2 + "s";
    document.body.appendChild(sparkle);
  }
}
</script>

</body>
</html>
