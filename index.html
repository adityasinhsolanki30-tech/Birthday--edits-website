<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Edits</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  color: white;
  transition: background 2s;
}

/* Background animation */
.container {
  margin-top: 50px;
}

input, textarea, button {
  margin: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

/* Surprise section */
#surprise {
  display: none;
}
</style>
</head>

<body>

<h1>🎂 Birthday Edits Website 🎉</h1>

<div class="container">

  <!-- Upload Photo -->
  <input type="file" id="photoInput">

  <br>

  <!-- Date -->
  <input type="date" id="dateInput">

  <br>

  <!-- Message -->
  <textarea id="message" placeholder="Write birthday message..."></textarea>

  <br>

  <!-- Button -->
  <button onclick="startSurprise()">Press for Surprise 🎁</button>

</div>

<!-- Surprise -->
<div id="surprise">
  <h2 id="countdown"></h2>
  <img id="outputImage" width="200">
  <p id="outputMessage"></p>
</div>

<!-- Audio -->
<audio id="song">
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>

// 🌈 Background colors
const colors = ["#ff4d4d", "#ffcc00", "#33cc33", "#3399ff", "#cc33ff"];
let i = 0;

setInterval(() => {
  document.body.style.background = colors[i];
  i = (i + 1) % colors.length;
}, 2000);

// 🎁 Main function
function startSurprise() {
  document.getElementById("surprise").style.display = "block";

  // Message
  let msg = document.getElementById("message").value;
  document.getElementById("outputMessage").innerText = msg;

  // Image
  let file = document.getElementById("photoInput").files[0];
  let reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById("outputImage").src = e.target.result;
  }
  if(file) reader.readAsDataURL(file);

  // Music
  document.getElementById("song").play();

  // Countdown
  let date = new Date(document.getElementById("dateInput").value);

  setInterval(() => {
    let now = new Date();
    let diff = date - now;

    if(diff <= 0) {
      document.getElementById("countdown").innerText = "🎉 Happy Birthday! 🎉";
      return;
    }

    let days = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("countdown").innerText = days + " days left 🎂";
  }, 1000);
}

</script>

</body>
</html>
